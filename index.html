<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>The Program Playbook</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <style>
            :root{
                --bg:#000; --panel:#0c0c0e; --line:#242427; --ink:#fff; --muted:#a9a9a9;
                --accent:#FFB548; --accent-fill:#FDA82B; --accent-ink:#000;
                --font:'Public Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            }
            *{box-sizing:border-box}
            .staticrypt-html,.staticrypt-body{height:100%}
            .staticrypt-body{margin:0}
            .hidden{display:none !important}
            .staticrypt-content{
                min-height:100%;margin:0;background:var(--bg);color:var(--ink);
                font-family:var(--font);-webkit-font-smoothing:antialiased;
                display:flex;align-items:center;justify-content:center;
            }
            .lock-wrap{width:100%;max-width:420px;padding:32px 24px;text-align:center;position:relative}
            .lock-wrap::before{content:"";position:absolute;left:50%;top:-40px;transform:translateX(-50%);
                width:380px;height:380px;border-radius:50%;pointer-events:none;
                background:radial-gradient(circle at center,rgba(255,181,72,.16),transparent 60%)}
            .lock-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:40px 34px}
            .brandline{font-weight:700;text-transform:uppercase;letter-spacing:.2em;font-size:13px;color:var(--ink);margin-bottom:30px}
            .brandline .sub{color:var(--muted);font-weight:500;letter-spacing:.16em;font-size:.8em}
            .lock-title{font-weight:800;font-size:30px;letter-spacing:-.02em;line-height:1.05;margin:0 0 8px}
            .lock-title .dot{color:var(--accent)}
            .lock-instructions{color:var(--muted);font-size:15px;margin:0 0 26px}
            .field{position:relative;margin-bottom:14px}
            .field input[type="password"],.field input[type="text"]{
                width:100%;background:#000;border:1px solid var(--line);border-radius:10px;
                color:var(--ink);font-family:var(--font);font-size:16px;padding:15px 46px 15px 16px;outline:none;transition:border-color .2s}
            .field input:focus{border-color:var(--accent)}
            .staticrypt-toggle-password-visibility{
                cursor:pointer;width:18px;height:18px;position:absolute;right:15px;top:50%;
                transform:translateY(-50%);filter:invert(.62)}
            .staticrypt-decrypt-button{
                width:100%;cursor:pointer;background:var(--accent-fill);color:var(--accent-ink);
                border:2px solid var(--accent);border-radius:10px;padding:14px;margin-top:4px;
                font-family:var(--font);font-weight:800;font-size:14px;letter-spacing:.12em;text-transform:uppercase;transition:.2s}
            .staticrypt-decrypt-button:hover{background:transparent;color:var(--accent)}
            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:9px;
                margin:16px 0 2px;color:var(--muted);font-size:13px;cursor:pointer}
            .staticrypt-remember input[type="checkbox"]{accent-color:var(--accent-fill);transform:scale(1.15)}
            .lock-foot{margin-top:24px;color:var(--muted);font-size:11px;letter-spacing:.16em;text-transform:uppercase}
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg)}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.25em solid #2a2a2a;
                border-right-color:var(--accent);border-radius:50%;animation:spinner-border .75s linear infinite}
            @keyframes spinner-border{100%{transform:rotate(360deg)}}
        </style>
    </head>

    <body class="staticrypt-body">

                        <input type="submit" class="staticrypt-decrypt-button" value="Enter" />
                    </form>
                </div>
                <p class="lock-foot">Confidential</p>
            </div>
        </div>
